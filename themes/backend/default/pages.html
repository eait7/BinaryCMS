<div class="card">
  <div class="card-header">
    <h3 class="card-title">Pages</h3>
    <div class="card-actions">
      {{ .Actions }}
    </div>
  </div>
  <div class="table-responsive">
    <table class="table card-table table-vcenter text-nowrap">
      <thead>
        <tr>
          <th class="w-1">ID</th>
          <th>Title</th>
          <th>Status</th>
          <th>Author ID</th>
          <th>Created At</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {{ range .Pages }}
        <tr>
          <td><span class="text-secondary">{{ .ID }}</span></td>
          <td><strong>{{ .Title }}</strong></td>
          <td>
            {{ if eq .Status "published" }}
              <span class="badge bg-green text-green-fg">Published</span>
            {{ else }}
              <span class="badge bg-yellow text-yellow-fg">Draft</span>
            {{ end }}
          </td>
          <td>{{ .AuthorID }}</td>
          <td>{{ .CreatedAt }}</td>
          <td class="text-end">
            <a href="/{{ .Slug }}" target="_blank" class="btn btn-sm btn-ghost-info">View</a>
            <a href="/admin/pages/edit/{{ .ID }}" class="btn btn-sm btn-ghost-primary">Edit</a>
            <form action="/admin/pages/delete/{{ .ID }}" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this page?');">
              <button type="submit" class="btn btn-sm btn-ghost-danger">Delete</button>
            </form>
          </td>
        </tr>
        {{ else }}
        <tr>
          <td colspan="6" class="text-center text-secondary py-4">No content matched your criteria.</td>
        </tr>
        {{ end }}
      </tbody>
    </table>
  </div>
</div>
