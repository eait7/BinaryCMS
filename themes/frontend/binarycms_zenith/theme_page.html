<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Page.Title}} &mdash; {{.Settings.site_name}}</title>
    <link rel="stylesheet" href="/uploads/zenith/zenith.css">
    <style>{{.Settings.custom_css}}</style>
</head>
<body>
    <div class="zh-blob"></div>

    <header class="zh-header">
        <a href="/" class="zh-logo">Binary<span>CMS</span></a>
        <nav class="zh-nav">
            <a href="/" class="zh-nav-link">Platform</a>
            {{range .MenuItems}}
            <a href="{{.URL}}" class="zh-nav-link">{{.Title}}</a>
            {{end}}
        </nav>
        <div class="zh-nav">
            {{if .User}}<a href="/dashboard" class="zh-btn zh-btn-outline">Dashboard</a>{{else}}<a href="/login" class="zh-nav-link">Log In</a>{{end}}
        </div>
    </header>

    <main class="zh-section" style="padding-top:12rem; min-height:80vh;">
        <div class="zh-container">
            <h1 class="zh-scramble zh-fade-up" data-text="{{.Page.Title}}" style="font-size:4rem;letter-spacing:-1px;margin-bottom:2rem;">{{.Page.Title}}</h1>
            <div class="zh-fade-up" style="max-width:800px;font-size:1.1rem;color:var(--zh-text-dim);">
                {{.Page.Content}}
            </div>
        </div>
    </main>

    <footer class="zh-footer">
        <div class="zh-container">
            <h2 class="zh-scramble" data-text="BinaryCMS">BinaryCMS</h2>
            <p>&copy; 2026 Developed with Go. Zenith Theme Edition.</p>
        </div>
    </footer>
    <script src="/uploads/zenith/zenith.js"></script>
    {{if .Settings.custom_scripts}}{{.Settings.custom_scripts}}{{end}}
</body>
</html>
