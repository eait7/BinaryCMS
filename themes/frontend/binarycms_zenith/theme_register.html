<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication &mdash; {{.Settings.site_name}}</title>
    <link rel="stylesheet" href="/uploads/zenith/zenith.css">
    <style>{{.Settings.custom_css}}</style>
</head>
<body style="min-height:100vh; display:flex; flex-direction:column;">
    <div class="zh-blob"></div>

    <header class="zh-header" style="position:static; border-bottom:none; background:transparent;">
        <a href="/" class="zh-logo">Binary<span>CMS</span></a>
    </header>

    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;">
        <div class="zh-card zh-fade-up" style="width:100%; max-width:400px; padding:3rem;">
            <h1 class="zh-scramble" data-text="{{if .CheckoutMode}}Checkout Registration{{else}}Request Access{{end}}" style="font-size:1.8rem; margin-bottom:0.5rem; text-align:center;">Register</h1>
            <p style="color:var(--zh-text-dim); text-align:center; font-size:0.9rem; margin-bottom:2rem;">Establish your identity profile within the system.</p>
            
            {{if .Error}}
            <div style="background:rgba(255,50,50,0.1); color:#ff5555; padding:1rem; border-radius:6px; font-size:0.85rem; margin-bottom:1.5rem; text-align:center;">
                {{.Error}}
            </div>
            {{end}}

            <form action="/register" method="POST">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                {{if .CheckoutMode}}<input type="hidden" name="checkout" value="1">{{end}}
                
                <label class="zh-label">Username</label>
                <input type="text" name="username" class="zh-input" placeholder="Unique handle" required>
                
                <label class="zh-label">Email Address</label>
                <input type="email" name="email" class="zh-input" placeholder="secure@network.tld" required>
                
                <label class="zh-label">Passphrase</label>
                <input type="password" name="password" class="zh-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                
                <label class="zh-label">Confirm Passphrase</label>
                <input type="password" name="password_confirm" class="zh-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                
                <button type="submit" class="zh-btn zh-btn-primary" style="width:100%; margin-top:1rem;">Mint Identity</button>
            </form>
            
            <div style="text-align:center; margin-top:2rem; font-size:0.85rem;">
                <span style="color:var(--zh-text-dim)">Already identified?</span> <a href="/login" class="zh-text-gold">Authenticate</a>
            </div>
        </div>
    </main>

    <footer class="zh-footer" style="padding:2rem 0; font-size:0.8rem;">
        <div class="zh-container">&copy; 2026 Developed with Go. Zenith Theme Edition.</div>
    </footer>
    <script src="/uploads/zenith/zenith.js"></script>
</body>
</html>
